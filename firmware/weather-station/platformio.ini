; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ============================================================
; Station Météo — Arduino Nano ESP32 (ESP32-S3)
; Projet : dede_automation / firmware
; ============================================================

[env:arduino_nano_esp32]
platform = espressif32
board = arduino_nano_esp32
framework = arduino


; --- Communication série (USB natif CDC) ---
; Le Nano ESP32 est un ESP32-S3 : son port série passe par
; l'USB natif, pas par une puce UART externe. Sans ce flag,
; Serial.print() reste muet dans le moniteur. C'est LE piège
; classique de cette carte.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

; --- Vitesse du moniteur série ---
monitor_speed = 115200

; --- Bibliothèques (versions épinglées pour la reproductibilité) ---
; Le « ^ » = « cette version ou toute version compatible supérieure
; dans la même version majeure ». Builds identiques Ubuntu / Windows.
lib_deps =
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    olikraus/U8g2 @ ^2.35.30